# ═══════════════════════════════════════════════════════════════════════════════
# Google Cloud Build — Build & Deploy to Cloud Run
# ═══════════════════════════════════════════════════════════════════════════════
#
# Usage:
#   gcloud builds submit --config cloudbuild.yaml .
#
# Or set up a Cloud Build trigger for auto-deploy on git push.
#
# Required substitutions (set in Cloud Build trigger or CLI):
#   _REGION: Cloud Run region (default: asia-southeast1)
#   _SERVICE_NAME: Cloud Run service name (default: open-retail-api)
#   _CLOUD_SQL_INSTANCE: Cloud SQL connection name (PROJECT:REGION:INSTANCE)
# ═══════════════════════════════════════════════════════════════════════════════

substitutions:
  _REGION: asia-southeast1
  _SERVICE_NAME: kengi-tech-api

steps:
  # Step 1: Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest'
      - '.'

  # Step 2: Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$COMMIT_SHA'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest'

  # Step 3: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--image'
      - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$COMMIT_SHA'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '3'
      - '--port'
      - '8080'
      - '--set-env-vars'
      - 'NODE_ENV=production'

images:
  - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest'

options:
  logging: CLOUD_LOGGING_ONLY
